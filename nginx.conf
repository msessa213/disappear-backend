http {
    include       mime.types;
    default_type  application/octet-stream;

    types {
        application/vnd.android.package-archive apk;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
}